{% extends "base.html" %}
{% block title %}تعديل بيانات الوحدة{% endblock %}
{% block content %}
    <h1>تعديل بيانات الوحدة</h1>
    <form method="POST">
        {{ form.hidden_tag() }}
        <div class="form-group">
            {{ form.cluster.label }} {{ form.cluster(class_='form-control') }}
        </div>
        <div class="form-group">
            {{ form.villa.label }} {{ form.villa(class_='form-control') }}
        </div>
        <button type="submit" class="btn btn-success">ارسال</button>
    </form>
{% endblock %}
