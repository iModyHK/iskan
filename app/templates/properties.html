{% extends "base.html" %}
{% block title %}الوحدات السكنية{% endblock %}
{% block content %}
    <h1>الوحدات السكنية</h1>
    <a href="{{ url_for('add_property') }}" class="btn btn-success mb-3">إضافة وحدة سكنية</a>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>الحي</th>
                <th>الوحدة</th>
                <th>الحالة</th>
                <th>الإجراءات</th>
            </tr>
        </thead>
        <tbody>
            {% for property in properties %}
                <tr>
                    <td>{{ property.cluster }}</td>
                    <td>{{ property.villa }}</td>
                    <td>{{ property.status }}</td>
                    <td>
                        <a href="{{ url_for('edit_property', property_id=property.id) }}" class="btn btn-primary btn-sm">تعديل</a>
                        <form action="{{ url_for('delete_property', property_id=property.id) }}" method="POST" style="display:inline;" onsubmit="return confirmDelete();">
                            <button type="submit" class="btn btn-danger btn-sm">حذف</button>
                        </form>
                        
                        <script>
                        function confirmDelete() {
                            return confirm('هل أنت متأكد أنك تريد حذف هذه الوحدة؟');
                        }
                        </script>
                    </td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
{% endblock %}
